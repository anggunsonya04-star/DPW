<!DOCTYPE html>
<html>
<head>
    <title>Menu jQuery</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        ul { list-style: none; }
        li {
            display: inline-block;
            background: blue;
            color: white;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<ul id="menu">
    <li>Home</li>
    <li>About</li>
    <li>Contact</li>
</ul>

<script>
$(document).ready(function(){
    $("#menu li").click(function(){
        alert("Menu dipilih: " + $(this).text());
    });
});
</script>

</body>
</html>
