<!DOCTYPE html>
<html>
<head>
    <title>Dialog jQuery</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>
<body>

<button id="btnDialog">Buka Dialog</button>

<div id="dialog" title="Dialog Sederhana">
    <p>Ini adalah dialog menggunakan jQuery UI</p>
</div>

<script>
$(function(){
    $("#dialog").dialog({
        autoOpen: false
    });

    $("#btnDialog").click(function(){
        $("#dialog").dialog("open");
    });
});
</script>

</body>
</html>
